<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login Popup</title>
    <link rel="stylesheet" href="signin.css">
    <script src="close.js" defer></script>
</head>

<body>

    <div class="background">

        <div class="login-box">
            <img class="logo" src="aihouse.png" alt="jpg">
            <span  id="close"  class="close">×</span>

            <h2>Welcome <span>Back</span></h2>
            <p>Sign in to your AI House account</p>

            <form action="/homePage/homePage.html">

                <label>Email address</label>
                <input required id="email" type="email" placeholder="you@example.com">

                <label>Password</label>
                <input required id="password" type="password" placeholder="********">
                <div class="forgot">
                    <a href="#">Forgot password</a>
                </div>


                <div class="box"> <button type="submit">Sign In</button>
                </div>

                <div class="register">
                    No account? <a href="#">Register here</a>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
